<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCommerce Fraud & WA Checker</title>
    <!-- Google Font for Hind Siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #0070f3;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-wa {
            background-color: #25D366;
            color: white;
        }
        .btn-wa:hover { background-color: #1ebd57; }
        
        .courier-section {
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .courier-title {
            font-size: 14px;
            color: #777;
            margin-bottom: 12px;
            text-align: center;
            font-weight: bold;
        }
        .courier-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .btn-courier {
            font-size: 13px;
            background: #f0f2f5;
            color: #333;
            padding: 10px 5px;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #ddd;
        }
        .btn-courier:hover {
            background: #e4e6eb;
        }
        .alert {
            display: none;
            padding: 10px;
            background-color: #ffebe9;
            color: #ff1a1a;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>eCommerce Verify Tool</h2>
    
    <div id="errorAlert" class="alert">দয়া করে সঠিক নম্বর দিন!</div>
    
    <div class="form-group">
        <label for="phoneNumber">কাস্টমার ফোন নম্বর:</label>
        <input type="text" id="phoneNumber" placeholder="01XXXXXXXXX" autocomplete="off">
    </div>
    
    <button class="btn btn-wa" onclick="handleWhatsApp()">
        💬 Open WhatsApp Chat
    </button>
    
    <div class="courier-section">
        <div class="courier-title">কুরিয়ার ফ্রড চেক লিংক (নম্বর অটো কপি হবে)</div>
        <div class="courier-grid">
            <a href="https://merchant.steadfast.com.bd/fraud-check" target="_blank" class="btn-courier" onclick="copyNumber()">Steadfast</a>
            <a href="https://merchant.pathao.com/" target="_blank" class="btn-courier" onclick="copyNumber()">Pathao</a>
            <a href="https://portal.redx.com.bd/" target="_blank" class="btn-courier" onclick="copyNumber()">RedX</a>
        </div>
    </div>
</div>

<script>
function processNumber() {
    let phone = document.getElementById('phoneNumber').value.trim();
    if(phone === "") return null;
    
    // নম্বর ফরম্যাট ঠিক করা (880 যোগ করা)
    if(phone.startsWith("0")) {
        phone = "88" + phone;
    } else if(phone.startsWith("+880")) {
        phone = phone.replace("+", "");
    }
    return phone;
}

function handleWhatsApp() {
    let phone = processNumber();
    let alertBox = document.getElementById('errorAlert');
    
    if(!phone || phone.length < 11) {
        alertBox.style.display = "block";
        return;
    }
    alertBox.style.display = "none";
    
    let message = encodeURIComponent("হ্যালো, আপনার ই-কমার্স অর্ডারের কনফার্মেশনের জন্য নক দিয়েছি।");
    let whatsappURL = "https://wa.me/" + phone + "?text=" + message;
    
    window.open(whatsappURL, '_blank');
}

function copyNumber() {
    let phoneInput = document.getElementById('phoneNumber');
    if(phoneInput.value.trim() !== "") {
        phoneInput.select();
        phoneInput.setSelectionRange(0, 99999); // মোবাইলের জন্য
        navigator.clipboard.writeText(phoneInput.value.trim());
    }
}
</script>

</body>
</html>
