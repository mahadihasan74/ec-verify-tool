<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCommerce Internal Verify Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 20px; font-weight: 700; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: 'Hind Siliguri', sans-serif; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; font-family: 'Hind Siliguri', sans-serif; }
        button:hover { background: #0051b3; }
        .result-box { margin-top: 25px; padding: 15px; background: #f1f5f9; border-radius: 8px; display: none; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; align-items: center; }
        .result-item:last-child { border: none; }
        .label { font-weight: 600; color: #475569; }
        .value { font-weight: 700; color: #0f172a; text-align: right; }
        .loading { text-align: center; display: none; color: #64748b; margin-top: 15px; font-weight: bold; }
        .btn-wa { background-color: #25D366; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px; margin-top: 15px; transition: background 0.3s; }
        .btn-wa:hover { background-color: #1ebd57; }
    </style>
</head>
<body>

<div class="card">
    <h2>eCommerce Verify Tool</h2>
    <input type="text" id="phoneInput" placeholder="কাস্টমারের ফোন নম্বর দিন (01XXXXXXXXX)">
    <button onclick="checkCustomerData()">ডাটা চেক করুন</button>
    
    <div id="loadingText" class="loading">⏳ কুরিয়ার ডাটাবেজ থেকে লাইভ সার্চ হচ্ছে...</div>

    <div id="resultBox" class="result-box">
        <div class="result-item"><span class="label">নম্বর:</span> <span class="value" id="resPhone">-</span></div>
        <div class="result-item"><span class="label">Steadfast:</span> <span class="value" id="resSF" style="color: #0070f3;">-</span></div>
        <div class="result-item"><span class="label">Pathao:</span> <span class="value" id="resPT">-</span></div>
        <div class="result-item"><span class="label">RedX:</span> <span class="value" id="resRX">-</span></div>
        
        <a href="#" id="waLink" target="_blank" class="btn-wa">💬 Chat on WhatsApp</a>
    </div>
</div>

<script>
async function checkCustomerData() {
    let phone = document.getElementById('phoneInput').value.trim();
    if(!phone) { alert("দয়া করে একটি নম্বর দিন!"); return; }

    document.getElementById('loadingText').style.display = "block";
    document.getElementById('resultBox').style.display = "none";

    if (phone.startsWith("+88")) phone = phone.replace("+88", "");
    else if (phone.startsWith("88")) phone = phone.substring(2);
    if (!phone.startsWith("0")) phone = "0" + phone;

    // 🔗 আপনার একদম নতুন গুগল ওয়েব অ্যাপ লিঙ্কটি এখানে সঠিকভাবে বসানো হয়েছে
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbxaLqEtfC6h-UBv1LDPM7UB94TXBzR2D7rVFzNoq0kvdfB4q2A337-q-wTEfLMbWCyk/exec";

    try {
        let response = await fetch(`${googleScriptUrl}?phone=${phone}`, {
            method: "GET",
            mode: "cors",
            redirect: "follow"
        });
        
        let data = await response.json();

        document.getElementById('resPhone').innerText = phone;
        document.getElementById('resSF').innerText = data.steadfast;
        document.getElementById('resPT').innerText = data.pathao;
        document.getElementById('resRX').innerText = data.redx;
        
        let cleanPhone = phone;
        if(cleanPhone.startsWith("0")) { cleanPhone = "88" + cleanPhone; }
        let message = encodeURIComponent("হ্যালো, আপনার অর্ডারের কনফার্মেশনের জন্য নক দিয়েছি।");
        document.getElementById('waLink').href = `https://wa.me/${cleanPhone}?text=${message}`;
        
        document.getElementById('resultBox').style.display = "block";
    } catch (error) {
        console.error(error);
        alert("ডাটা কানেকশনে সমস্যা হচ্ছে। পেজটি রিফ্রেশ দিয়ে আবার চেষ্টা করুন।");
    } finally {
        document.getElementById('loadingText').style.display = "none";
    }
}
</script>

</body>
</html>
